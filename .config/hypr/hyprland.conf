# Get Colors to Use in This Config
source = ~/.config/hypr/my-colors.conf

## MONITORS #
# See https://wiki.hypr.land/Configuring/Monitors/

monitor=,preferred,auto-center-right,1.0
monitor=eDP-1,preferred,auto,1.33
monitor=desc:LG Electronics LG ULTRAWIDE 305NTPC0D184,preferred,auto-center-right,1.0

xwayland {
    force_zero_scaling = true
}

$scripts = ~/.config/hypr/scripts
$lock = ~/.config/hypr/scripts/lock.sh

## AUTOSTART ##

exec-once = kanata -c ~/.config/kanata.kbd && sleep 1 && kanata -c ~/.config/kanata-global.kbd
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = fcitx5

exec-once = ~/scripts/battery-monitor.sh

exec-once = bash -c "sleep 0.5 && $lock"
exec-once = ~/.config/hypr/scripts/random-wall.sh

## Environment Variables ##

# GPU compatability
env = LIBVA_DRIVER_NAME,nvidia
env = __GLZ_VENDOR_LIBRARY_NAME,nvidia
env = __GL_GSYNC_ALLOWED,1
env = __GL_VRR_ALLOWED,0

env = AQ_DRM_DEVICES, /dev/dri/intel-igpu

# Enable Wayland support for some electron apps
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Toolkit backend
env = SDL_VIDEODRIVER,wayland,x11
env = CLUTTER_BACKEND,wayland

# QT variables
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# GDK
env = GDK_BACKEND,wayland,x11,*

env = GTK_USE_PORTAL,1

# XDG specifications
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Cursor
env = XCURSOR_THEME,catppuccin-mocha-dark-cursors
env = HYPRCURSOR_THEME,catppuccin-mocha-dark-cursors
env = XCURSOR_SIZE,26
env = HYPRCURSOR_SIZE,26

# IME
# env = GTK_IM_MODULE,fcitx
# env = QT_IM_MODULE,fcitx
# env = XMODIFIERS,@im,fcitx
## LOOK AND FEEL ##

# See https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 12

    border_size = 2

    col.active_border = $cBlue $cLavender 90deg
    col.inactive_border = rgba(6c7086bb)

    resize_on_border = false

    allow_tearing = false

    no_focus_fallback = true

    layout = scrolling
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 4.0

    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_special = 0.5

    shadow {
        enabled = true
        range = 4
        render_power = 4
        color = rgba(6c7086bb)
    }

    # See https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 1

        new_optimizations = true
        xray = false
        input_methods = true

        vibrancy = 0.1696
    }

    layerrule = blur on, match:namespace waybar
    layerrule = blur on, match:namespace rofi
}

# See https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)
    workspace_wraparound = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global,     1, 1, default
    animation = border,     1, 1, easeOutQuint

    animation = windows,    1, 2, easeOutQuint
    animation = windowsIn,  1, 2, easeOutQuint, popin 0%
    animation = windowsOut, 1, 3, easeOutQuint, popin 0%
    animation = fadeIn,     1, 2, almostLinear
    animation = fadeOut,    1, 2, almostLinear
    animation = fade,       1, 2, quick

    animation = layers,         1, 1, easeOutQuint
    animation = layersIn,       1, 1, easeOutQuint, fade
    animation = layersOut,      1, 1, linear, fade
    animation = fadeLayersIn,   1, 1, almostLinear
    animation = fadeLayersOut,  1, 1, almostLinear

    animation = workspaces,     1, 2, easeOutQuint, slidefadevert
    animation = workspacesIn,   1, 2, easeOutQuint, slidefadevert
    animation = workspacesOut,  1, 2, easeOutQuint, slidefadevert

    animation = specialWorkspace,     1, 3, easeOutQuint, fade

}

# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    mfact = 0.5
}

scrolling {
    follow_min_visible = 0.4
}

# See https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    enable_anr_dialog = false
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

binds {
    workspace_back_and_forth = false
    hide_special_on_workspace_change = true
    focus_preferred_method = 1
    window_direction_monitor_fallback = 1
}

cursor {
    hotspot_padding = 1
    inactive_timeout = 3
    hide_on_key_press = false
}

# See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    repeat_rate = 30
    repeat_delay = 300

    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
        clickfinger_behavior = true
    }
}

device {
    name = tpps/2-elan-trackpoint
    sensitivity = 0.2
    scroll_factor = 0.5
}

# Disable trackpad area
device {
    name = snsl002d:00-2c2f:002d-touchpad
    enabled = false
}

device {
    name = wacom-one-by-wacom-s-pen
    output = eDP-1
}

## KEYBINDINGS ##
# See https://wiki.hypr.land/Configuring/Binds/
# TODO: reorganize these
$mainMod = ALT

# Lock and exit
bind = $mainMod, escape, exec, $lock
bind = $mainMod SHIFT, escape, exit,

# Color picker
bind = $mainMod, Y, exec, hyprpicker -alnf hex

# Screenshots
bind = $mainMod, P, exec, hyprshot -m region
bind = $mainMod SHIFT, P, exec, hyprshot -m window

# Kill current window
bind = $mainMod, Q, killactive

# Run terminal
bind = $mainMod, T, exec, kitty
bind = $mainMod, B, exec, xdg-open https://  # Open the default browser
bind = $mainMod, N, exec, obsidian

# TODO: Force a max size for the floating window
bind = $mainMod, F, exec, hyprctl --batch "dispatch togglefloating ; dispatch centerwindow"
# TODO: update rofi here
bind = $mainMod, R, exec, rofi -show drun -display-drun Apps -drun-match-fields name
bind = $mainMod SHIFT, R, exec, rofi -show run -display-run Run
bind = $mainMod, C, exec, rofi -show calc -display-calc Calc
bind = $mainMod, E, exec, rofimoji --action copy
bind = $mainMod, U, exec, rofimoji --action copy --files all

# Change drawing tablet display
bind = $mainMod, D, exec, $scripts/cycle-tablet-output.sh

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Swap windows
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, L, swapwindow, r

# Switch workspaces
bind = $mainMod, 1, focusworkspaceoncurrentmonitor, 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor, 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor, 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor, 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor, 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor, 6

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6

# Move between displays
bind = $mainMod, tab, focusmonitor, +1
bind = $mainMod SHIFT, tab, focusmonitor, -1

# Resize columns on scrolling layout
bind = $mainMod, comma, layoutmsg, colresize -conf
bind = $mainMod, period, layoutmsg, colresize +conf

# Resize master layout
# bind = $mainMod, slash, layoutmsg, mfact exact 0.5
# bind = $mainMod, comma, layoutmsg, mfact -0.04
# bind = $mainMod, period, layoutmsg, mfact +0.04

# Special workspaces
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod, M, exec, $scripts/move-special.sh nofocus
# bind = $mainMod SHIFT, M, exec, $scripts/move-special.sh

# Move/resize windows using mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

## WINDOW RULES ##
# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# TODO: clean up window rules from original config here

# Config overrides for special workspace
workspace = s[true], gapsin:9, gapsout:32

windowrule {
name = spotify-window-float
    match:class = spotify

    float = on
    size = 500 400
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Put file chooser in float
    name = floating-file-chooser
    match:title = termfilechooser

    float = on
    size = 1200 800
    opacity = 0.95
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
